<html lang="pt-br">
  <head>
    <meta charset="utf-8">

    <!-- sua CSS -->
      <link rel="stylesheet" href="./css/styles.css">
  </head>

  <body>
    <!-- menu de navegação (navbar) -->

    <nav class="navbar navbar-expand-lg my-4">
  <div class="container">
    <a class="navbar-brand title-size" href="#"> <i class="bi bi-highlighter me-2"></i>SisNotas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <i class="bi bi-filter-right"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="#">CADASTRAR NOTAS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">ALUNOS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">RESUMO DE NOTAS</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            CONTA

            <li><a class="dropdown-item" href="#">FAZER LOGIN</a></li>

            <li><a class="dropdown-item" href="#">CRIAR CONTA</a></li>

    <main class="container">
        <h3 class="display-6">Cadastro de Notas</h3>

        <form id="form-notas" name="form-notas" method="get" action="">
            <div class="row">
                <section class="my-3 col-md-6">
                    <label for="nome-aluno" class="form-label">Nome do Aluno</label>
                    <input type="text" id="nome-aluno"
                    name="nome-aluno" class="form-control" placeholder="Ex: Fulano de tal" minlength="10" maxlength="50" required>
                </section>
                
                <section class="my-3 col-md-6">
                    <label for="disciplina" class="form-label">Disciplina</label>
                    <select name="disciplina" id="disciplina" class="form-select">
                        <option value=""disabled selected>Selecione a Disciplina</option>
                        <option value="Matemática">Matemática</option>
                        <option value="Português">Português</option>
                        <option value="História">História</option>
                        <option value="Química">Química</option>
                        <option value="Programação Web">Programação Web</option>
                        <option value="Web Design">Web Design</option>
                        <option value="Framework">Framework</option>
                    </select>       
                </section>  

                <section class="my-3 col-md-6">
                    <label for="nota1" class="form-label" >Nota 1</label>
                    <input type="text" id="nota1" name="nota1" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-3 col-md-6">
                    <label for="nota2" class="form-label" >Nota 2</label>
                    <input type="text" id="nota2" name="nota2" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-3 col-md-6">
                    <label for="nota3" class="form-label" >Nota 3</label>
                    <input type="text" id="nota3" name="nota3" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-3 col-md-6">
                    <label for="nota4" class="form-label" >Nota 4</label>
                    <input type="text" id="nota4" name="nota4" class="form-control" required minlength="1" maxlength="4" placeholder="Ex: 10.0">
                </section>

                <section class="my-5 d-flex justify-content-end">
                    <button type="submit" class="btn btn-danger">Calcular Notas</button>
                </section>
            </div>
        </form> 

        <h3 class="display-6 mb-4">Resumo de Notas</h3>
        <div class="table-responsive">
         <table class="table text-center">
            <thead class="table-dark">
                <tr>
                    <th>Aluno</th>
                    <th>Disciplina</th>
                    <th>Nota 1</th>
                    <th>Nota 2</th>
                    <th>Nota 3</th>
                    <th>Nota 4</th>
                    <th>Média</th>
                    <th>Resultado</th>
                </tr>
            </thead>
        
            <tbody id="dados-notas"></tbody>
            <tfoot>
                <tr>
                    <td colspan="8">Dados atualizados em:</td>
                </tr>
            </tfoot>

         </table>
        </div>


    </main>
    


  

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</html>
