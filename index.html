<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistemas de Notas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

  <body>
    <header class="bg-danger p-5 mb-4">
       <h1 class="text-light display-4">Sistemas de Notas <i class="bi bi-highlighter"></i></h1>
    </header>

    <main class="container">
        <h3 class="display-6">Cadastro de Notas</h3>

        <form id="form-notas" name="form-notas" method="get" action="">
            <div>
                <section class="my-3">
                    <label for="nome-aluno" class="form-label">Nome do Aluno</label>
                    <input type="text" id="nome-aluno"
                    name="nome-aluno" class="form-control" placeholder="Ex: Fulano de tal" minlength="10" maxlength="50" required>
                </section>
                
                <section class="my-3">
                    <label for="disciplina" class="form-label">Disciplina</label>
                    <select name="disciplina" id="disciplina" class="form-select">
                        <option value=""disabled selected>Selecione a Disciplina</option>
                        <option value="Matemática">Matemática</option>
                        <option value="Português">Português</option>
                        <option value="História">História</option>
                        <option value="Química">Química</option>
                        <option value="Programação Web">Programação Web</option>
                        <option value="Web Design">Web Design</option>
                        <option value="Framework">Framework</option>
                    </select>       
                </section>
                
                <section class="my-5 d-flex justify-content-end">
                    <button type="submit" class="btn btn-danger">Calcular Notas</button>
                </section>

    
            </div>
        </form> 

    </main>
    









    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
